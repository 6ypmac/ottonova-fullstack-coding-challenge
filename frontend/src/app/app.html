<div class="container">
  <h1>Cities</h1>

  <div class="controls">
    <input
      type="text"
      placeholder="Search..."
      [(ngModel)]="search"
      (ngModelChange)="onSearchInput($event)"
    />

    <select [(ngModel)]="continent" (ngModelChange)="onContinentChange($event)">
      <option value="">All continents</option>

      @for (continent of continents; track continent) {
        <option [value]="continent">{{ continent }}</option>
      }
    </select>

    <select [(ngModel)]="sort" (ngModelChange)="onSortChange($event)">
      <option value="">No sorting</option>
      <option value="population:asc">Population &uparrow;</option>
      <option value="population:desc">Population &downarrow;</option>
    </select>
  </div>

  <div class="content">
    @if (isLoading()) {
      <p class="status">Loading...</p>
    }

    @if (error()) {
      <p class="status error">{{ error() }}</p>
    }

    @if (!isLoading() && !error()) {
      <ul class="cities-list">
        @for (city of cities; track city.name) {
          <li>
            <strong>{{ city.name }}</strong>
            <span>{{ city.country }}</span>
            <span class="population">{{ city.population }}</span>
          </li>
        }
      </ul>
    }
  </div>
</div>
