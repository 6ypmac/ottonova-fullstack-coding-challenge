<div class="container">
  <h1>Cities</h1>

  <app-filters
    [search]="search"
    [continent]="continent"
    [sort]="sort"
    [continents]="continents"
    (searchChange)="onSearchInput($event)"
    (continentChange)="onContinentChange($event)"
    (sortChange)="onSortChange($event)"
  ></app-filters>

  <div class="content">
    @if (isLoading()) {
      <p class="status">Loading...</p>
    }

    @if (error()) {
      <p class="status error">{{ error() }}</p>
    }

    @if (!isLoading() && !error()) {
      <ul class="cities-list">
        @for (city of cities; track city.name) {
          <li>
            <strong>{{ city.name }}</strong>
            <span>{{ city.country }}</span>
            <span class="population">{{ city.population }}</span>
          </li>
        }
      </ul>
    }
  </div>
</div>
