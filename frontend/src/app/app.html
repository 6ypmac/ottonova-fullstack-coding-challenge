<div class="container">
  <h1>Cities</h1>

  <app-filters
    [search]="search"
    [continent]="continent"
    [sort]="sort"
    [continents]="continents"
    (searchChange)="onSearchInput($event)"
    (continentChange)="onContinentChange($event)"
    (sortChange)="onSortChange($event)"
  ></app-filters>

  <div class="content">
    @if (isLoading()) {
      <p class="status">Loading...</p>
    }

    @if (error()) {
      <p class="status error">{{ error() }}</p>
    }

    @if (!isLoading() && !error()) {
      <app-cities-list [cities]="cities"></app-cities-list>
    }
  </div>
</div>
